<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" width="1200" height="940" font-family="'Sora',system-ui,sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="26%" r="60%">
      <stop offset="0%" stop-color="#12245e"/>
      <stop offset="100%" stop-color="#0a1130"/>
    </radialGradient>
    <linearGradient id="env" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9edf7"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1130" stop-opacity=".16"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="940" fill="url(#glow)"/>

  <!-- balloon envelope -->
  <g filter="url(#soft)">
    <!-- base white envelope -->
    <path d="M600 70
             C 810 70 940 250 940 430
             C 940 560 860 660 730 715
             L 470 715
             C 340 660 260 560 260 430
             C 260 250 390 70 600 70 Z" fill="url(#env)"/>
    <!-- eBay colour gores -->
    <path d="M600 70 C 690 72 760 120 810 200 L 720 715 L 610 715 L 600 70 Z" fill="#E53238" opacity=".10"/>
    <path d="M600 70 C 510 72 440 120 390 200 L 480 715 L 590 715 L 600 70 Z" fill="#0064D2" opacity=".10"/>
    <path d="M810 200 C 900 300 940 360 940 430 C 940 540 880 630 760 690 L 720 715 L 810 200 Z" fill="#F5AF02" opacity=".12"/>
    <path d="M390 200 C 300 300 260 360 260 430 C 260 540 320 630 440 690 L 480 715 L 390 200 Z" fill="#86B817" opacity=".12"/>
    <!-- subtle shading -->
    <path d="M600 70 C 810 70 940 250 940 430 C 940 560 860 660 730 715 L 470 715 C 340 660 260 560 260 430 C 260 250 390 70 600 70 Z" fill="url(#shade)"/>
    <!-- gore seams -->
    <g stroke="#c9d2e8" stroke-width="1.4" opacity=".7" fill="none">
      <path d="M600 70 L 600 715"/>
      <path d="M470 90 C 400 260 430 540 505 715"/>
      <path d="M730 90 C 800 260 770 540 695 715"/>
      <path d="M330 200 C 300 380 360 600 440 700"/>
      <path d="M870 200 C 900 380 840 600 760 700"/>
    </g>
  </g>

  <!-- eBay logo band on envelope -->
  <g transform="translate(600 400)" text-anchor="middle" font-weight="800" font-size="150" letter-spacing="-6">
    <text><tspan fill="#E53238">e</tspan><tspan fill="#0064D2">b</tspan><tspan fill="#F5AF02">a</tspan><tspan fill="#86B817">y</tspan></text>
  </g>

  <!-- basket + suspension to truck -->
  <g stroke="#c9d2e8" stroke-width="2.4" opacity=".85">
    <line x1="475" y1="715" x2="545" y2="800"/>
    <line x1="725" y1="715" x2="655" y2="800"/>
    <line x1="540" y1="715" x2="575" y2="800"/>
    <line x1="660" y1="715" x2="625" y2="800"/>
  </g>
  <!-- rig bar -->
  <rect x="500" y="798" width="200" height="14" rx="4" fill="#1a2a63" stroke="#39508f"/>
  <!-- rig cables to truck -->
  <g stroke="#8fa0cf" stroke-width="2.2" opacity=".8">
    <line x1="520" y1="812" x2="520" y2="860"/>
    <line x1="680" y1="812" x2="680" y2="860"/>
    <line x1="600" y1="812" x2="600" y2="858"/>
  </g>

  <!-- suspended pickup truck (stylised, eBay red) -->
  <g transform="translate(600 892)">
    <!-- cargo bed (rear) -->
    <rect x="-4" y="-30" width="120" height="40" rx="6" fill="#12245e" stroke="#39508f" stroke-width="2"/>
    <!-- cab (front) -->
    <path d="M-116 10 L-116 -30 C-116 -52 -100 -66 -74 -66 L-40 -66 C-20 -66 -4 -52 -4 -30 L-4 10 Z" fill="#E53238" stroke="#a8202a" stroke-width="2"/>
    <!-- windshield + door window -->
    <path d="M-96 -30 L-86 -52 L-40 -52 L-24 -30 Z" fill="#0a1130" opacity=".9"/>
    <line x1="-64" y1="-52" x2="-64" y2="-30" stroke="#a8202a" stroke-width="2"/>
    <!-- chassis -->
    <rect x="-118" y="8" width="238" height="12" rx="5" fill="#0a1130"/>
    <!-- wheels -->
    <circle cx="-78" cy="24" r="18" fill="#0a1130" stroke="#39508f" stroke-width="4"/>
    <circle cx="-78" cy="24" r="6" fill="#39508f"/>
    <circle cx="80" cy="24" r="18" fill="#0a1130" stroke="#39508f" stroke-width="4"/>
    <circle cx="80" cy="24" r="6" fill="#39508f"/>
  </g>
</svg>
