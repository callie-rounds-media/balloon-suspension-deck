<!doctype html><html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
  html,body{background:#0a1130;width:440px;height:900px;overflow:hidden}
  .phone{position:relative;width:440px;height:900px;background:#000;overflow:hidden}
  .feed{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .scrim-top{position:absolute;top:0;left:0;right:0;height:190px;background:linear-gradient(180deg,rgba(0,0,0,.72),transparent)}
  .scrim-bot{position:absolute;bottom:0;left:0;right:0;height:420px;background:linear-gradient(0deg,rgba(0,0,0,.86),rgba(0,0,0,.35) 55%,transparent)}
  /* top bar */
  .top{position:absolute;top:22px;left:20px;right:20px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:baseline;gap:7px;font-weight:800;font-size:26px;letter-spacing:-.02em}
  .brand .e{color:#E53238}.brand .b{color:#0064D2}.brand .a{color:#F5AF02}.brand .y{color:#86B817}
  .live{background:#E53238;color:#fff;font-size:12px;font-weight:800;letter-spacing:.12em;padding:4px 9px;border-radius:6px;transform:translateY(-3px)}
  .viewers{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);padding:7px 12px;border-radius:20px;color:#fff;font-size:14px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:#ff3b3b;box-shadow:0 0 0 0 rgba(255,59,59,.6)}
  /* seller pill */
  .seller{position:absolute;top:78px;left:20px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);padding:8px 14px 8px 8px;border-radius:30px}
  .seller .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#E53238,#F5AF02);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
  .seller .nm{color:#fff;font-weight:700;font-size:15px;line-height:1.1}
  .seller .sub{color:#b9c2d6;font-weight:500;font-size:11.5px}
  .follow{margin-left:6px;background:#0064D2;color:#fff;font-weight:700;font-size:12.5px;padding:6px 13px;border-radius:16px}
  /* chat */
  .chat{position:absolute;left:20px;bottom:250px;display:flex;flex-direction:column;gap:9px;max-width:290px}
  .msg{color:#fff;font-size:13.5px;line-height:1.3;text-shadow:0 1px 3px rgba(0,0,0,.7)}
  .msg b{font-weight:700;color:#8fb7ff;margin-right:6px}
  /* auction card */
  .auction{position:absolute;left:16px;right:16px;bottom:104px;background:rgba(15,20,40,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:14px;display:flex;gap:14px;align-items:center}
  .cardimg{width:74px;height:100px;border-radius:10px;flex:none;background:linear-gradient(150deg,#c9a24b,#f6e6b0 45%,#b8862f);position:relative;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .cardimg::after{content:"RC";position:absolute;top:7px;left:8px;font-weight:800;font-size:12px;color:#7a5a12}
  .cardimg .plyr{position:absolute;inset:16px 8px 8px;border-radius:5px;background:linear-gradient(180deg,#123a6b,#0a1f3c)}
  .info{flex:1;min-width:0}
  .tag{color:#F5AF02;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .title{color:#fff;font-weight:700;font-size:16px;line-height:1.15;margin-top:3px}
  .bidrow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:9px}
  .bid .lbl{color:#9aa6bf;font-size:11px;font-weight:500}
  .bid .amt{color:#fff;font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1}
  .bidbtn{background:#0064D2;color:#fff;font-weight:800;font-size:15px;padding:12px 20px;border-radius:14px;box-shadow:0 8px 20px rgba(0,100,210,.4)}
  .ticks{position:absolute;top:-30px;right:2px;color:#86ffb0;font-size:12px;font-weight:700}
  /* bottom bar */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(6,10,25,.9);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-around;padding-bottom:14px}
  .tabbar span{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.16)}
  .tabbar .mid{width:52px;height:34px;border-radius:10px;background:#E53238}
</style></head>
<body>
<div class="phone">
  <img class="feed" src="04-wide-b.png" alt="">
  <div class="scrim-top"></div>
  <div class="scrim-bot"></div>

  <div class="top">
    <div style="display:flex;align-items:center;gap:9px">
      <div class="brand"><span class="e">e</span><span class="b">b</span><span class="a">a</span><span class="y">y</span></div>
      <div class="live">LIVE</div>
    </div>
    <div class="viewers"><span class="dot"></span>18.6K watching</div>
  </div>

  <div class="seller">
    <div class="av">BB</div>
    <div><div class="nm">Break'n Bad</div><div class="sub">Live card break · Top Seller</div></div>
    <div class="follow">Follow</div>
  </div>

  <div class="chat">
    <div class="msg"><b>mike_collects</b>this is insane 🔥</div>
    <div class="msg"><b>cardqueen</b>that pull!! 😱</div>
    <div class="msg"><b>joeyb</b>bidding now</div>
  </div>

  <div class="auction">
    <div class="cardimg"><div class="plyr"></div></div>
    <div class="info">
      <div class="tag">Live auction · closes 0:38</div>
      <div class="title">1998 Rookie Refractor /10</div>
      <div class="bidrow">
        <div class="bid"><div class="lbl">Current bid</div><div class="amt">$1,250 <span style="color:#86ffb0;font-size:14px;font-weight:700;letter-spacing:0">▲ $150</span></div></div>
        <div class="bidbtn">Place bid</div>
      </div>
    </div>
  </div>

  <div class="tabbar"><span></span><span></span><div class="mid"></div><span></span><span></span></div>
</div>
</body></html>
