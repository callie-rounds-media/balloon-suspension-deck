<!doctype html><html><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#e9edf2;padding:40px}
  .wrap{max-width:1200px;margin:0 auto}
  .hero{position:relative;border-radius:22px;overflow:hidden;box-shadow:0 34px 80px -40px rgba(9,20,48,.4)}
  .hero .base{display:block;width:100%}
  .ins{position:absolute;overflow:hidden}
  .ins img{width:100%;height:100%;object-fit:cover;display:block}
  .feather{-webkit-mask-image:radial-gradient(ellipse 96% 96% at 50% 50%,#000 30%,transparent 82%);mask-image:radial-gradient(ellipse 96% 96% at 50% 50%,#000 30%,transparent 82%)}
  .cards{width:39%;aspect-ratio:16/10;right:1%;top:7%}
  .cheer{width:39%;aspect-ratio:16/10;right:1%;bottom:7%}
</style></head><body>
<div class="wrap">
  <div class="hero">
    <img class="base" src="photos/football-hero.png">
    <div class="ins feather cards"><img src="photos/set/crop-cards.png"></div>
    <div class="ins feather cheer"><img src="photos/set/crop-cheer.png"></div>
  </div>
</div>
</body></html>
